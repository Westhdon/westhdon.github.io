<style>
    .scroll-progress {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, #b8ff57, #57ffd4);
        z-index: 9999;
    }
    .scroll-progress .progress-dot {
        position: absolute;
        top: -8px;
        width: 20px;
        height: 20px;
        background: #57ffd4;
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(87, 253, 212, 0.8);
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.5); opacity: 0.7; }
        100% { transform: scale(1); }
    }
</style>

<div class="scroll-progress">
    <div class="progress-dot" id="progress-dot"></div>
</div>

<script>
    window.addEventListener('scroll', function() {
        var scrollTop = window.scrollY;
        var docHeight = document.documentElement.scrollHeight - window.innerHeight;
        var scrollPercent = (scrollTop / docHeight) * 100;
        document.getElementById('progress-dot').style.left = scrollPercent + '%';
    });
</script>
